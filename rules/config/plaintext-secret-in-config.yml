id: sign.plaintext-secret-in-config
language: json
severity: error
message: |-
  Plaintext credential committed in an agent/MCP config file (a real API token /
  key literal, e.g. in an MCP server's env block). Baked-in secrets survive prompt
  injection and leak with the repo.
  Architectural fix: reference a secret manager / env indirection from config; never inline tokens (Shift 2).
metadata:
  shift: sign
  component: config
  confidence: high
  framework: aws-iam-best-practices
  references:
    - https://docs.aws.amazon.com/secretsmanager/latest/userguide/best-practices.html
# Match well-known credential token shapes as the JSON string VALUE — high
# precision because these prefixes + length are unambiguous secrets, not config.
rule:
  kind: string
  regex: "(ghp_|gho_|ghu_|ghs_|github_pat_|sk-[A-Za-z0-9]|xox[baprs]-|AKIA[A-Z0-9]{12}|AIza[A-Za-z0-9_-]{10})"
