id: sign.gateway-unauthenticated-endpoint
language: python
severity: error
message: |-
  Gateway / MCP endpoint defined without an authentication dependency. Anyone can invoke tools.
  Architectural fix: require auth (OAuth, JWT, mTLS, API key) on every endpoint (Shift 2).
metadata:
  shift: sign
  component: gateway
  confidence: high
  framework: oauth-2.1-best-practices
  references:
    - https://datatracker.ietf.org/doc/draft-ietf-oauth-v2-1/
rule:
  all:
    - kind: decorated_definition
    # HTTP route/endpoint decorator across web frameworks: FastAPI/Starlette/Flask/
    # Quart (.get/.post/.put/.delete/.patch/.route/.websocket/.add_api_route),
    # Flask Blueprint, Django REST (api_view) - regardless of app variable name.
    # (MCP @mcp.tool decorators are covered by sign.mcp-tool-without-allowlist.)
    - has:
        kind: decorator
        regex: '\.(post|get|put|delete|patch|route|websocket|api_route|add_api_route)\b|api_view'
    - not:
        has:
          stopBy: end
          any:
            - pattern: Depends($$$)
            - pattern: Security($$$)
            - pattern: Authorizer($$$)
            - pattern: api_key_header
            - pattern: verify_token($$$)
            - pattern: verify_jwt($$$)
            - pattern: $$$.verify_jwt($$$)
            - pattern: require_auth
            - pattern: requires_auth
            - pattern: login_required
            - pattern: jwt_required($$$)
            - pattern: HTTPBearer($$$)
            - pattern: get_current_user
