id: sign.a2a-communication-without-auth
language: python
severity: error
message: |-
  Agent-to-agent (A2A) message send to an agent endpoint without an auth header /
  signature. Agent impersonation risk.
  Architectural fix: sign every A2A message; verify the signature on receive (Shift 2).
metadata:
  shift: sign
  component: gateway
  confidence: medium
  maestro_layer: L7
  framework: maestro-l7
  references:
    - https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
rule:
  any:
    # HTTP POST to an agent-bound endpoint via ANY client lib (requests, httpx,
    # aiohttp session, generic $CLIENT.post) where some string in the call reads
    # agent-bound, and no auth/header is attached inline.
    - all:
        - any:
            - pattern: requests.post($URL, json=$BODY)
            - pattern: $CLIENT.post($URL, json=$BODY)
            - pattern: requests.post($URL, json=$BODY, $$$REST)
            - pattern: $CLIENT.post($URL, json=$BODY, $$$REST)
        - has:
            stopBy: end
            kind: string
            regex: '(?i)(agent|a2a|run|task|invoke|message|skill|handoff|peer|dispatch)'
        - not:
            has:
              stopBy: end
              any:
                - kind: keyword_argument
                  regex: '^(headers|auth|cert|token)='
                - has:
                    stopBy: end
                    kind: string
                    regex: '(?i)authorization|bearer'
    # Agent-client message send with no signature or headers attached.
    - all:
        - any:
            - pattern: $CLIENT.send_message($$$MSG)
            - pattern: $CLIENT.send_task($$$MSG)
            - pattern: $CLIENT.send_to_agent($$$MSG)
            - pattern: $CLIENT.dispatch($$$MSG)
        - not:
            has:
              stopBy: end
              any:
                - pattern: $X.signature
                - pattern: sign_message($$$)
                - pattern: sign($$$)
                - pattern: headers=$HEADERS
                - pattern: signature=$SIG
