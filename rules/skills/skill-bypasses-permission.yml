id: sign.skill-bypasses-permission
language: python
severity: error
message: |-
  Skill / Claude Code config sets dangerously-skip-permissions or bypassPermissions. Disables the deny-by-default gate.
  Architectural fix: never bypass permission gates in production agents (Shift 2).
metadata:
  shift: sign
  component: skills
  framework: anthropic-claude-code-best-practices
  references:
    - https://docs.claude.com/en/docs/claude-code/security
rule:
  any:
    # keyword arg in ANY call: permission_mode/permissionMode = "bypassPermissions"
    - kind: keyword_argument
      all:
        - has: { field: name, regex: "^(permission_mode|permissionMode)$" }
        - has: { field: value, regex: "bypassPermissions" }
    # keyword arg: dangerously_skip_permissions=True
    - kind: keyword_argument
      all:
        - has: { field: name, regex: "dangerously_skip_permissions" }
        - has: { field: value, regex: "^True$" }
    # dict literal: {"permissionMode": "bypassPermissions"}
    - kind: pair
      all:
        - has: { field: key, regex: "permission_?[Mm]ode" }
        - has: { field: value, regex: "bypassPermissions" }
    # CLI flag string anywhere (subprocess args / command string)
    - kind: string
      regex: "dangerously-skip-permissions"
