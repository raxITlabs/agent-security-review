id: scope.skill-without-description
language: python
severity: info
message: |-
  Skill / tool function lacks docstring or description. LLM cannot reason about when to call it; defaults to over-use.
  Architectural fix: every tool needs an explicit description bounding its purpose (Shift 1).
metadata:
  shift: scope
  component: skills
  framework: openai-agents-sdk-best-practices
  references:
    - https://platform.openai.com/docs/guides/agents
rule:
  kind: decorated_definition
  all:
    - has:
        kind: decorator
        regex: "@(tool|function_tool)\\b"
    - has:
        kind: function_definition
        not:
          has:
            kind: block
            has:
              kind: expression_statement
              has: { kind: string }
