id: scope.skill-with-dangerous-tool-combo-ts
language: typescript
severity: error
message: |-
  Module combines a dangerous tool set (shell + network + filesystem write).
  Lethal Trifecta candidate.
  Architectural fix: split into specialized skills, each with a narrow tool list (Shift 1).
metadata:
  shift: scope
  component: skills
  framework: meta-rule-of-two
  references:
    - https://ai.meta.com/blog/practical-ai-agent-security/
rule:
  all:
    - kind: program
    - has:
        stopBy: end
        any:
          - pattern: execSync($$$)
          - pattern: exec($$$)
          - pattern: execFile($$$)
          - pattern: execFileSync($$$)
          - pattern: spawn($$$)
          - pattern: spawnSync($$$)
          - pattern: $SH.spawn($$$)
          - pattern: $SH.exec($$$)
    - has:
        stopBy: end
        any:
          - pattern: fetch($$$)
          - pattern: $NETOBJ.post($$$)
          - pattern: $NETOBJ.put($$$)
          - pattern: $NETOBJ.request($$$)
          - pattern: axios($$$)
          - pattern: got($$$)
    - has:
        stopBy: end
        any:
          - pattern: writeFileSync($$$)
          - pattern: appendFileSync($$$)
          - pattern: writeFile($$$)
          - pattern: appendFile($$$)
          - pattern: createWriteStream($$$)
          - pattern: $FSOBJ.writeFile($$$)
          - pattern: $FSOBJ.appendFile($$$)
          - pattern: $FSOBJ.write($$$)
