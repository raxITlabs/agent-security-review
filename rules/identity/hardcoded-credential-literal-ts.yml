id: sign.hardcoded-credential-literal-ts
language: typescript
severity: error
message: |-
  Hardcoded credential literal in source. Survives prompt injection because it is baked in.
  Architectural fix: load from a secrets manager / KMS with per-task scope (Shift 2).
rule:
  any:
    - pattern: const $VAR = $VAL
    - pattern: let $VAR = $VAL
    - pattern: var $VAR = $VAL
    - all:
        - kind: pair
        - has:
            field: key
            regex: '(?i)(api_?key|apikey|password|passwd|pwd|secret|secret_?key|secretkey|token|auth_?token|access_?key|access_?token|private_?key|client_?secret|credential)$'
        - has:
            field: value
            pattern: $VAL
    - all:
        - kind: public_field_definition
        - has:
            field: name
            regex: '(?i)(api_?key|apikey|password|passwd|pwd|secret|secret_?key|secretkey|token|auth_?token|access_?key|access_?token|private_?key|client_?secret|credential)$'
        - has:
            field: value
            pattern: $VAL
constraints:
  VAR:
    regex: '(?i)(api_?key|apikey|password|passwd|pwd|secret|secret_?key|secretkey|token|auth_?token|access_?key|access_?token|private_?key|client_?secret|credential)$'
  VAL:
    all:
      - kind: string
      - regex: '\S{10,}'
      - not:
          regex: '(?i)(your|example|changeme|placeholder|dummy|sample|redacted|xxxx|process\.env|getenv|none|null)'
metadata:
  shift: sign
  component: identity
  framework: aws-iam-best-practices
  references:
    - https://docs.aws.amazon.com/secretsmanager/latest/userguide/best-practices.html
