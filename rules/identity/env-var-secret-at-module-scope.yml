id: sign.env-var-secret-at-module-scope
language: python
severity: warning
message: |-
  Env var secret read at module scope and reused across all tool calls. Ambient identity / Confused Deputy risk.
  Architectural fix: read per-task with capability warrant context (Shift 2).
metadata:
  shift: sign
  component: identity
  framework: camel-confused-deputy
  references:
    - https://arxiv.org/abs/2503.18813
rule:
  all:
    - any:
        - pattern: $X = os.environ[$KEY]
        - pattern: $X = os.environ.get($KEY)
        - pattern: $X = os.getenv($KEY)
    - not:
        inside:
          stopBy: end
          any:
            - kind: function_definition
            - kind: class_definition
# Only flag env vars whose NAME denotes a secret. The old rule fired on any
# module-scope env read, so non-secret config (`CORS_ALLOW_ORIGINS`, `BASE_URL`,
# a release tag) was reported as an "ambient secret". Constrain the env-var key.
constraints:
  KEY:
    regex: '(?i)(secret|token|password|passwd|api_?key|apikey|access_?key|private_?key|credential|client_?secret|auth_?token)'
