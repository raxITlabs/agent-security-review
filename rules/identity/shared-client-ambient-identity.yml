id: sign.shared-client-ambient-identity
language: python
severity: info
message: |-
  Client built at module scope, so every tool call shares one ambient identity
  (Confused Deputy). This is advisory: module-scope construction is also the
  common, framework-recommended pattern (e.g. a thread-safe boto3 client), so it's
  only a real risk for multi-tenant agents that should scope credentials per task.
  Architectural fix (if multi-tenant): construct per task with a scoped capability warrant (Shift 2).
metadata:
  shift: sign
  component: identity
  confidence: low
  framework: camel-confused-deputy
  references:
    - https://arxiv.org/abs/2503.18813
rule:
  all:
    - any:
        - pattern: $X = boto3.client($$$)
        - pattern: $X = boto3.resource($$$)
        - pattern: $X = boto3.Session($$$)
        - pattern: $X = Anthropic($$$)
        - pattern: $X = anthropic.Anthropic($$$)
        - pattern: $X = AsyncAnthropic($$$)
        - pattern: $X = AnthropicBedrock($$$)
        - pattern: $X = OpenAI($$$)
        - pattern: $X = openai.OpenAI($$$)
        - pattern: $X = AsyncOpenAI($$$)
        - pattern: $X = AzureOpenAI($$$)
        - pattern: $X = genai.GenerativeModel($$$)
        - pattern: $X = genai.Client($$$)
        - pattern: $X = cohere.Client($$$)
        - pattern: $X = cohere.ClientV2($$$)
        - pattern: $X = MistralClient($$$)
        - pattern: $X = Mistral($$$)
        - pattern: $X = Groq($$$)
        - pattern: $X = Together($$$)
    - not:
        inside:
          stopBy: end
          any:
            - kind: function_definition
            - kind: class_definition
