id: sign.hardcoded-credential-literal
language: python
severity: error
message: |-
  Hardcoded credential literal in source. Survives prompt injection because it is baked in.
  Architectural fix: load from a secrets manager / KMS with per-task scope (Shift 2).
metadata:
  shift: sign
  component: identity
  framework: aws-iam-best-practices
  references:
    - https://docs.aws.amazon.com/secretsmanager/latest/userguide/best-practices.html
rule:
  pattern: $VAR = $VAL
# A credential-shaped name assigned a string literal that actually looks like a
# secret. The old rule matched `name = "<anything>"`, so empty strings
# (`api_key = ""`), bare prefixes (`token = "hf_"`), and placeholders all fired
# as "hardcoded credentials". Require a real-looking value: a string literal with
# a run of >=10 non-space characters that isn't an obvious placeholder / env ref.
constraints:
  VAR:
    regex: '(?i)(api_?key|apikey|password|passwd|pwd|secret|secret_?key|secretkey|token|auth_?token|access_?key|access_?token|private_?key|client_?secret|credential)$'
  VAL:
    all:
      - kind: string
      - regex: '\S{10,}'
      - not:
          regex: '(?i)(your|example|changeme|placeholder|dummy|sample|redacted|xxxx|\$\{|os\.environ|process\.env|getenv|none|null)'
