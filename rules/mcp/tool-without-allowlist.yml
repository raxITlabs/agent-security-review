id: sign.mcp-tool-without-allowlist
language: python
severity: warning
message: |-
  MCP tool fetches a URL/path parameter with no allowlist / validation. SSRF / path traversal risk.
  Architectural fix: validate URLs against an allowlist; canonicalize paths (Shift 2).
metadata:
  shift: sign
  component: mcp
  confidence: medium
  framework: semgrep-ai-best-practices
  references:
    - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
# Anchor on decorated_definition (kind first inside all) so the FastMCP
# `@mcp.tool()` call-decorator is matched, not skipped.
rule:
  all:
    - kind: decorated_definition
    - has:
        kind: decorator
        regex: "(server|mcp|app|tool_router|fastmcp)\\.tool"
    - has:
        stopBy: end
        any:
          - pattern: requests.get($URL)
          - pattern: requests.post($URL)
          - pattern: requests.request($$$)
          - pattern: httpx.get($URL)
          - pattern: httpx.post($URL)
          - pattern: urllib.request.urlopen($URL)
    - not:
        has:
          stopBy: end
          any:
            - pattern: urlparse($$$)
            - pattern: validate_url($$$)
            - pattern: $$$.startswith($$$)
            - pattern: $URL in $ALLOW
            - pattern: ALLOWED_$$$
            - pattern: allowlist
