id: sign.mcp-tool-without-allowlist
language: python
severity: warning
message: |-
  MCP tool fetches a URL/path parameter with no allowlist / validation. SSRF / path traversal risk.
  Architectural fix: validate URLs against an allowlist; canonicalize paths (Shift 2).
metadata:
  shift: sign
  component: mcp
  confidence: medium
  framework: semgrep-ai-best-practices
  references:
    - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
rule:
  all:
    - kind: decorated_definition
    - has:
        kind: decorator
        regex: "(server|mcp|app|tool_router|fastmcp)\\.(tool|call_tool)\\b|^@tool\\b"
    - has:
        stopBy: end
        any:
          - pattern: requests.$M($$$)
          - pattern: httpx.$M($$$)
          - pattern: aiohttp.$M($$$)
          - pattern: urllib.request.urlopen($$$)
          - all:
              - kind: call
              - regex: "(?i)\\b(session|client|http|conn|c|s)\\.(get|post|put|patch|delete|request)\\("
              - has:
                  field: function
                  kind: attribute
                  regex: "(?i)\\.(get|post|put|patch|delete|request)$"
    - not:
        has:
          stopBy: end
          any:
            - pattern: urlparse($$$)
            - pattern: validate_url($$$)
            - pattern: $$$.startswith($$$)
            - pattern: $URL in $ALLOW
            - pattern: ALLOWED_$$$
            - pattern: allowlist
