id: scope.mcp-server-without-input-validation
language: python
severity: error
message: |-
  MCP server tool reaches a dangerous sink (shell / SQL / exec) with its parameters unvalidated. Tool poisoning / RCE risk.
  Architectural fix: validate every tool parameter against an allowlist before any side effect (Shift 1).
metadata:
  shift: scope
  component: mcp
  confidence: high
  framework: msrc-prompts-become-shells
  references:
    - https://www.microsoft.com/en-us/security/blog/2026/05/07/prompts-become-shells-rce-vulnerabilities-ai-agent-frameworks/
    - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
rule:
  all:
    - kind: decorated_definition
    - has:
        kind: decorator
        regex: "(server|mcp|app|tool_router|fastmcp)\\.(tool|call_tool)\\b|^@tool\\b"
    - has:
        stopBy: end
        any:
          - pattern: subprocess.$M($$$)
          - pattern: os.system($$$)
          - pattern: os.popen($$$)
          - pattern: os.exec$M($$$)
          - pattern: eval($$$)
          - pattern: exec($$$)
          - pattern: $CUR.execute(f"$$$")
          - pattern: $CUR.execute($A + $B)
          - pattern: $CUR.executescript($$$)
