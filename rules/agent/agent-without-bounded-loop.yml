id: scope.agent-without-bounded-loop
language: python
severity: warning
message: |-
  Agent loop has no max_iterations / max_turns bound. Risks unbounded loop / denial-of-wallet.
  Architectural fix: cap agent steps and budget per task (Shift 1, Scope).
metadata:
  shift: scope
  component: agent
  framework: openai-agents-sdk-best-practices
  references:
    - https://platform.openai.com/docs/guides/agents
rule:
  any:
    # LangChain AgentExecutor
    - all:
        - pattern: AgentExecutor($$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^(max_iterations|max_execution_time)$' }
    # LangChain legacy initialize_agent
    - all:
        - pattern: initialize_agent($$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^(max_iterations|max_execution_time)$' }
    # OpenAI Agents SDK Agent(model=, tools=)
    - all:
        - pattern: Agent(model=$M, tools=$T, $$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^(max_turns|max_iterations)$' }
    # LangGraph create_react_agent — bound is recursion_limit
    - all:
        - pattern: create_react_agent($$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^(recursion_limit|max_iterations)$' }
    # CrewAI Agent(role=) — bound is max_iter
    - all:
        - pattern: Agent(role=$R, $$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^(max_iter|max_iterations)$' }
    # LlamaIndex ReActAgent.from_tools — bound is max_iterations
    - all:
        - pattern: ReActAgent.from_tools($$$)
        - not:
            has:
              stopBy: end
              kind: keyword_argument
              has: { field: name, regex: '^max_iterations$' }
