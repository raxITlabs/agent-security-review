id: scope.rule-of-two-violation-ts
language: typescript
severity: error
message: |-
  Meta Rule of Two violated. Module registers tools spanning all three risky
  properties: [A] untrusted input ingestion, [B] sensitive data access,
  [C] state change / external comm. This is the lethal trifecta.
  Architectural fix: split into specialized agents OR require human-in-the-loop before action (Shift 1).
metadata:
  shift: scope
  component: agent
  framework: meta-rule-of-two
  properties: [untrusted_input, sensitive_access, state_change]
  references:
    - https://ai.meta.com/blog/practical-ai-agent-security/
    - https://simonwillison.net/2025/Jun/16/the-lethal-trifecta/
rule:
  all:
    - kind: program
    # [A] untrusted input ingestion: fetch / http client GET / search / retrieve / read
    - has:
        stopBy: end
        any:
          - pattern: fetch($$$)
          - pattern: $$$.fetch($$$)
          - pattern: $$$.fetchUrl($$$)
          - pattern: $$$.get($$$)
          - pattern: $$$.search($$$)
          - pattern: $$$.retrieve($$$)
          - pattern: $$$.invoke($$$)
          - pattern: $$$.readEmail($$$)
          - pattern: governed($A, $$$)
    # [B] sensitive data access: db query / secret / vault read
    - has:
        stopBy: end
        any:
          - pattern: $$$.query($$$)
          - pattern: $$$.getSecret($$$)
          - pattern: $$$.getSecretValue($$$)
          - pattern: $$$.execute($$$)
          - pattern: governed($B, $$$)
    # [C] state change / external comm: POST / send / settle / write
    - has:
        stopBy: end
        any:
          - pattern: $$$.post($$$)
          - pattern: $$$.sendMail($$$)
          - pattern: $$$.sendEmail($$$)
          - pattern: $$$.sendMessage($$$)
          - pattern: $$$.postMessage($$$)
          - pattern: $$$.createPr($$$)
          - pattern: $$$.settle($$$)
          - pattern: fetch($URL, $OPTS)
          - pattern: governed($C, $$$)
