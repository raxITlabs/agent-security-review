id: sign.memory-write-no-auth-context
language: python
severity: warning
message: |-
  Memory write happens without authorization context check. Any tool call can write to memory.
  Architectural fix: require auth context / principal check before memory writes (Shift 2).
metadata:
  shift: sign
  component: memory
  framework: aws-cedar-agentcore
  references:
    - https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/policy-common-patterns.html
rule:
  any:
    - pattern: $MEM.add_memory($$$)
    - pattern: $MEM.save_memory($$$)
    - pattern: $MEM.create_event($$$)
    - pattern: $MEM.save_context($$$)
    - pattern: $MEM.add($$$)
    - pattern: $MEM.put($$$)
    - pattern: $MEM.set($$$)
    - pattern: $MEM.hset($$$)
    - pattern: $MEM.put_item($$$)
    - pattern: $MEM.upsert($$$)
    - pattern: $MEM.add_texts($$$)
    - pattern: $MEM.add_documents($$$)
constraints:
  MEM:
    regex: '(?i)(mem|memor|store|client|table|index|vector|redis|cache|context|history|kb|knowledge|collection|conversation|recall|agent)'
