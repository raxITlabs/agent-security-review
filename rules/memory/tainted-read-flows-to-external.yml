id: stop.memory-tainted-read-flows-to-external
language: python
severity: error
message: |-
  Function reads from memory store and sends external request. Tainted memory may be exfiltrated.
  Architectural fix: reference monitor with session taints between memory read and external send (Shift 3).
metadata:
  shift: stop
  component: memory
  framework: cedar-action-composition
  references:
    - https://arxiv.org/abs/2403.04651
rule:
  all:
    - kind: function_definition
    - has:
        stopBy: end
        any:
          - pattern: $$$.load_memory_variables($$$)
          - pattern: $$$.get_memories($$$)
          - pattern: $$$.list_events($$$)
          - pattern: $$$.similarity_search($$$)
          - pattern: $$$.get_relevant_documents($$$)
          - pattern: $$$.search($$$)
          - all:
              - any:
                  - pattern: $MEM.invoke($$$)
                  - pattern: $MEM.retrieve($$$)
                  - pattern: $MEM.query($$$)
                  - pattern: $MEM.get($$$)
                  - pattern: $MEM.get_item($$$)
                  - pattern: $MEM.hget($$$)
              - has:
                  field: function
                  has:
                    field: object
                    regex: '(?i)(mem|memor|store|vector|retriev|index|redis|cache|history|kb|knowledge|collection|conversation|recall|docstore|rag|chroma|faiss|pinecone|weaviate|qdrant|milvus|table)'
    - has:
        stopBy: end
        any:
          - pattern: requests.post($$$)
          - pattern: requests.put($$$)
          - pattern: requests.get($$$)
          - pattern: requests.patch($$$)
          - pattern: httpx.post($$$)
          - pattern: httpx.get($$$)
          - pattern: urllib.request.urlopen($$$)
          - pattern: $CLIENT.post($$$)
          - pattern: $CLIENT.send($$$)
          - pattern: $$$.send_email($$$)
          - pattern: $$$.send_message($$$)
          - pattern: $$$.sendmail($$$)
