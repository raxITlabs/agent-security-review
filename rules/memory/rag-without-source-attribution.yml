id: scope.rag-without-source-attribution
language: python
severity: warning
message: |-
  RAG retrieval result fed into an LLM prompt without source attribution metadata.
  Indirect prompt injection risk: compromised retrieved documents inject instructions invisibly.
  Architectural fix: tag every retrieved chunk with source URL + trust label; render in prompt (Shift 1).
metadata:
  shift: scope
  component: memory
  maestro_layer: L2
  framework: maestro-l2-rag-poisoning
  references:
    - https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
    - https://simonwillison.net/2023/Apr/14/worst-that-can-happen/
rule:
  all:
    - any:
        - pattern: $RESULTS = $RETRIEVER.invoke($$$)
        - pattern: $RESULTS = $RETRIEVER.similarity_search($$$)
        - pattern: $RESULTS = $RETRIEVER.similarity_search_with_score($$$)
        - pattern: $RESULTS = $RETRIEVER.max_marginal_relevance_search($$$)
        - pattern: $RESULTS = $RETRIEVER.get_relevant_documents($$$)
        - pattern: $RESULTS = $RETRIEVER.aget_relevant_documents($$$)
        - pattern: $RESULTS = $RETRIEVER.retrieve($$$)
        - pattern: $RESULTS = $RETRIEVER.query($$$)
        - pattern: $RESULTS = $RETRIEVER.search($$$)
    - not:
        has:
          stopBy: end
          any:
            - pattern: $$$.metadata["source"]
            - pattern: $$$.metadata.get("source")
            - pattern: source_attribution
constraints:
  RETRIEVER:
    regex: '(?i)(retriev|vector|vectorstore|store|index|search|rag|knowledge|embed|chroma|faiss|pinecone|weaviate|qdrant|milvus|corpus|docstore|kb|collection|query_engine)'
