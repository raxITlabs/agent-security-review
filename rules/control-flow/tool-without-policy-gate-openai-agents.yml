id: stop.openai-agents-tool-without-policy-gate
language: python
severity: error
message: |-
  Function registered as an LLM tool (@function_tool in the OpenAI Agents SDK, @tool in
  LangChain, or @mcp.tool / @agent.tool in MCP / pydantic-ai) performs a side effect -
  network, state change, file, shell, or DB write - with no policy / authorization check
  first. Injected LLM output can drive the tool. Architectural fix: insert a reference
  monitor (Cedar / IAM / authZ) before the side effect (Shift 3).
metadata:
  shift: stop
  component: tool-dispatcher
  confidence: medium
  framework: msrc-prompts-become-shells
  references:
    - https://www.microsoft.com/en-us/security/blog/2026/05/07/prompts-become-shells-rce-vulnerabilities-ai-agent-frameworks/
    - https://openai.github.io/openai-agents-python/tools/
rule:
  all:
    - kind: decorated_definition
    - has:
        stopBy: end
        any:
          - pattern: "@function_tool"
          - pattern: "@function_tool($$$)"
          - pattern: "@tool"
          - pattern: "@tool($$$)"
          - pattern: "@$X.tool"
          - pattern: "@$X.tool($$$)"
          - pattern: "@$X.function_tool"
          - pattern: "@$X.function_tool($$$)"
    - has:
        kind: function_definition
        stopBy: end
    - has:
        stopBy: end
        any:
          - pattern: requests.$M($$$)
          - pattern: httpx.$M($$$)
          - pattern: urllib.request.urlopen($$$)
          - pattern: $C.post($$$)
          - pattern: $C.put($$$)
          - pattern: $C.delete($$$)
          - pattern: $C.send_message($$$)
          - pattern: $C.send($$$)
          - pattern: send_email($$$)
          - pattern: subprocess.$M($$$)
          - pattern: os.system($$$)
          - pattern: eval($$$)
          - pattern: exec($$$)
          - pattern: $C.execute($$$)
          - pattern: $C.run($$$)
          - pattern: $C.query($$$)
          - pattern: $C.put_item($$$)
          - pattern: $C.upsert($$$)
          - pattern: $C.save($$$)
          - pattern: $C.set($$$)
          - pattern: $C.write($$$)
          - pattern: open($$$)
          - pattern: boto3.client($$$)
    - not:
        has:
          stopBy: end
          any:
            - pattern: check_permission($$$)
            - pattern: authorize($$$)
            - pattern: require_auth($$$)
            - pattern: require_capability($$$)
            - pattern: policy.check($$$)
            - pattern: $$$.decide($$$)
            - pattern: gov.decide($$$)
            - pattern: assert_permission($$$)
            - pattern: assert_auth($$$)
            - pattern: has_permission($$$)
            - pattern: $CTX.user.has_permission($$$)
            - pattern: check_scope($$$)
            - { kind: identifier, regex: "^(RunContextWrapper|RunnableConfig|InjectedState)$" }
            - { kind: identifier, regex: "^(principal|context)$" }
