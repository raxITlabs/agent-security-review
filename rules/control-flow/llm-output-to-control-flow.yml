id: stop.llm-output-to-control-flow
language: python
severity: error
message: |-
  LLM output steers program control flow (a branch/loop condition reads raw model
  output). CaMeL violation: untrusted model text decides what the program does.
  Architectural fix: use a Quarantined LLM that returns typed/validated values; do
  not branch on raw LLM output (Shift 3).
metadata:
  shift: stop
  component: control-flow
  confidence: medium
  framework: deepmind-camel
  references:
    - https://arxiv.org/abs/2503.18813
rule:
  any:
    - pattern: "if $LLM.invoke($$$): $$$"
    - pattern: "if $LLM.complete($$$): $$$"
    - pattern: "while $LLM.invoke($$$): $$$"
    - kind: function_definition
      all:
        - has:
            stopBy: end
            any:
              - pattern: $V = $LLM.invoke($$$)
              - pattern: $V = $LLM.ainvoke($$$)
              - pattern: $V = $LLM.complete($$$)
              - pattern: $V = $LLM.run($$$)
              - pattern: $V = $LLM.generate($$$)
              - pattern: $V = $LLM.predict($$$)
              - pattern: $V = $LLM.kickoff($$$)
              - pattern: $V = $LLM.converse($$$)
              - pattern: $V = $C.chat.completions.create($$$)
              - pattern: $V = $C.messages.create($$$)
              - pattern: $V = $C.responses.create($$$)
              - pattern: $V = Runner.run($$$)
              - pattern: $V = Runner.run_sync($$$)
              - pattern: $V = completion($$$)
              - pattern: $V = acompletion($$$)
        - has:
            stopBy: end
            any:
              - kind: if_statement
                has: { stopBy: end, pattern: $V }
              - kind: while_statement
                has: { stopBy: end, pattern: $V }
