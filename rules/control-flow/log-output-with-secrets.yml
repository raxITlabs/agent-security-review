id: stop.log-output-with-secrets
language: python
severity: error
message: |-
  Logger / print call interpolates a likely-secret variable (token, api_key, password). Logs become exfiltration vector.
  Architectural fix: redact secrets before logging; never log credentials (Shift 3).
metadata:
  shift: stop
  component: control-flow
  maestro_layer: L5
  framework: maestro-l5
  references:
    - https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
    - https://owasp.org/www-project-logging-cheat-sheet/
rule:
  any:
    - pattern: $LOG.$LEVEL(f"$$${$SECRET}$$$")
    - pattern: $LOG.$LEVEL(f"$$${$OBJ.$SECRET}$$$")
    - pattern: print(f"$$${$SECRET}$$$")
    - pattern: print(f"$$${$OBJ.$SECRET}$$$")
constraints:
  SECRET:
    regex: '(?i)^(token|api_?key|apikey|password|passwd|secret|credentials?|bearer|private_?key|client_secret|access_key|access_token|auth_token|session_token|refresh_token)$'
  LEVEL:
    regex: '^(info|debug|warning|warn|error|critical|exception|log)$'
