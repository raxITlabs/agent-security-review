id: scope.openai-agents-runner-without-timeout
language: python
severity: warning
message: |-
  Runner.run() has no timeout. Denial-of-wallet risk if the model
  generates indefinitely. Architectural fix: thread a per-request
  timeout aligned with cost budget (Shift 1).
metadata:
  shift: scope
  component: agent
  maestro_layer: L1
  framework: openai-agents-sdk-best-practices
  references:
    - https://openai.github.io/openai-agents-python/
    - https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
rule:
  all:
    - any:
        - pattern: Runner.run($AGENT, $$$ARGS)
        - pattern: Runner.run_sync($AGENT, $$$ARGS)
        - pattern: Runner.run_streamed($AGENT, $$$ARGS)
    - not:
        has:
          stopBy: end
          kind: keyword_argument
          has:
            field: name
            regex: '^(timeout|request_timeout)$'
