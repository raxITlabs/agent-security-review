id: sign.memory-write-no-auth-context
language: python
severity: warning
message: |-
  Memory write happens without authorization context check. Any tool call can write to memory.
  Architectural fix: require auth context / principal check before memory writes (Shift 2).
metadata:
  shift: sign
  component: memory
  framework: aws-cedar-agentcore
  references:
    - https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/policy-common-patterns.html
rule:
  any:
    - pattern: $MEM.add_memory($$$)
    - pattern: $MEM.save_context($$$)
    - pattern: ConversationBufferMemory($$$).save_context($$$)
