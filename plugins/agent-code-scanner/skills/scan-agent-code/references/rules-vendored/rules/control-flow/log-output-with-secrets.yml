id: stop.log-output-with-secrets
language: python
severity: error
message: |-
  Logger / print call interpolates a likely-secret variable (token, api_key, password). Logs become exfiltration vector.
  Architectural fix: redact secrets before logging; never log credentials (Shift 3).
metadata:
  shift: stop
  component: control-flow
  maestro_layer: L5
  framework: maestro-l5
  references:
    - https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
    - https://owasp.org/www-project-logging-cheat-sheet/
rule:
  any:
    - pattern: logger.info(f"$$$ {token} $$$")
    - pattern: logger.info(f"$$$ {api_key} $$$")
    - pattern: logger.info(f"$$$ {password} $$$")
    - pattern: logger.info(f"$$$ {secret} $$$")
    - pattern: logger.debug(f"$$$ {token} $$$")
    - pattern: logger.debug(f"$$$ {api_key} $$$")
    - pattern: print(f"$$$ {token} $$$")
    - pattern: print(f"$$$ {api_key} $$$")
    - pattern: print(f"$$$ {password} $$$")
