id: sign.hardcoded-credential-literal-ts
language: typescript
severity: error
message: |-
  Hardcoded credential literal in source. Survives prompt injection because it is baked in.
  Architectural fix: load from secrets manager / KMS with per-task scope (Shift 2).
rule:
  any:
    - pattern: const apiKey = "$$$"
    - pattern: const API_KEY = "$$$"
    - pattern: const password = "$$$"
    - pattern: const PASSWORD = "$$$"
    - pattern: const secretKey = "$$$"
    - pattern: const SECRET_KEY = "$$$"
    - pattern: const token = "$$$"
    - pattern: const TOKEN = "$$$"
    - pattern: let apiKey = "$$$"
    - pattern: let API_KEY = "$$$"
    - pattern: let token = "$$$"
    - pattern: let TOKEN = "$$$"
    - pattern: var apiKey = "$$$"
    - pattern: var API_KEY = "$$$"
metadata:
  shift: sign
  component: identity
  framework: aws-iam-best-practices
  references:
    - https://docs.aws.amazon.com/secretsmanager/latest/userguide/best-practices.html
