id: sign.env-var-secret-at-module-scope-ts
language: typescript
severity: warning
message: |-
  Env var secret read at module scope and reused across all requests. Ambient identity / Confused Deputy risk.
  Architectural fix: read per-task with capability warrant context (Shift 2).
metadata:
  shift: sign
  component: identity
  framework: camel-confused-deputy
  references:
    - https://arxiv.org/abs/2503.18813
rule:
  all:
    - any:
        - pattern: const $X = process.env.$$$
        - pattern: let $X = process.env.$$$
        - pattern: var $X = process.env.$$$
        - pattern: const $X = process.env[$$$]
        - pattern: let $X = process.env[$$$]
    - not:
        inside:
          stopBy: end
          any:
            - kind: function_declaration
            - kind: arrow_function
            - kind: function_expression
            - kind: method_definition
            - kind: class_declaration
