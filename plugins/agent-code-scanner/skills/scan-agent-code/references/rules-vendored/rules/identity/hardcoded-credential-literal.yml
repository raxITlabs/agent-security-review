id: sign.hardcoded-credential-literal
language: python
severity: error
message: |-
  Hardcoded credential literal in source. Survives prompt injection because it is baked in.
  Architectural fix: load from secrets manager / KMS with per-task scope (Shift 2).
metadata:
  shift: sign
  component: identity
  framework: aws-iam-best-practices
  references:
    - https://docs.aws.amazon.com/secretsmanager/latest/userguide/best-practices.html
rule:
  any:
    - pattern: api_key = "$$$"
    - pattern: API_KEY = "$$$"
    - pattern: password = "$$$"
    - pattern: PASSWORD = "$$$"
    - pattern: secret_key = "$$$"
    - pattern: SECRET_KEY = "$$$"
    - pattern: token = "$$$"
    - pattern: TOKEN = "$$$"
