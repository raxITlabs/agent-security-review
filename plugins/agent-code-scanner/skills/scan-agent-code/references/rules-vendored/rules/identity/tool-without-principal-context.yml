id: sign.tool-without-principal-context
language: python
severity: warning
message: |-
  Tool function lacks principal/context/auth parameter. Cannot implement Cedar deny-by-default.
  Architectural fix: thread per-task identity through tool signatures (Shift 2).
metadata:
  shift: sign
  framework: aws-cedar-agentcore
  references:
    - https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/policy-common-patterns.html
rule:
  any:
    - all:
        - kind: function_definition
        - has: { kind: decorator, regex: "@tool" }
        - not:
            has:
              stopBy: end
              any:
                - pattern: principal
                - pattern: ctx.user
                - pattern: context.user
                - pattern: authorize($$$)
                - pattern: check_scope($$$)
                - pattern: require_capability($$$)
    - all:
        - kind: function_definition
        - has: { kind: decorator, regex: "@(mcp|server|app)\\.tool" }
        - not:
            has:
              stopBy: end
              any:
                - pattern: ctx.principal
                - pattern: authorize($$$)
    - all:
        - kind: function_definition
        - has: { kind: decorator, regex: "@function_tool" }
        - not:
            has:
              stopBy: end
              any:
                - pattern: ctx
                - pattern: authorize($$$)
